; ==========================================================================
; RENT-A-HAL Master Config — Star Trek Realm v1
; Self-describing schema. See realm/config_schema.py for the grammar.
; NEVER write this file back with configparser.write() — strips comments.
; ==========================================================================

; @section-label: Server
[Server]
; @label: Bind Host @type: str @scope: backend @help: 0.0.0.0 = all interfaces (ngrok-friendly)
host = 0.0.0.0
; @label: Port @type: int @min: 1 @max: 65535 @scope: backend @help: Default 9999 (ngrok http 9999)
port = 9999
; @label: Static Dir @type: path @scope: backend
static_dir = static
; @label: Templates Dir @type: path @scope: backend
templates_dir = templates

; @section-label: Logging
[Logging]
; @label: Log File @type: path @scope: backend
log_file = webgui_detailed.log
; @label: Log Level @type: choice @choices: DEBUG|INFO|WARNING|ERROR @scope: backend
log_level = INFO
; @label: Max Log Size (bytes) @type: int @min: 1048576 @scope: backend
log_max_bytes = 10485760
; @label: Log Backups @type: int @min: 0 @max: 50 @scope: backend
log_backup_count = 5

; @section-label: Branding
[Branding]
; @label: Page Title @type: str @scope: frontend
page_title = RENT-A-HAL
; @label: Banner Heading @type: str @scope: frontend
banner_heading = Ask anything by voice
; @label: Banner Subheading @type: str @scope: frontend
banner_subheading = Get the answer instantly
; @label: Realm Name @type: str @scope: frontend
realm_name = Star Trek Computer Realm

; @section-label: LLM Engine Chain
[LLMChain]
; @label: Provider Order @type: str @scope: backend @help: First available wins. Echo is the always-available floor.
llm_order = gpt4all,claude,huggingface,echo

; @section-label: GPT4All (local)
[GPT4All]
; @label: Host @type: str @scope: backend
host = localhost
; @label: Port @type: int @min: 1 @max: 65535 @scope: backend @help: GPT4All API default
port = 4891
; @label: Model @type: str @scope: backend @help: Must match the name in GPT4All exactly
model = Llama 3 8B Instruct
; @label: Timeout (s) @type: int @min: 5 @scope: backend
timeout = 60

; @section-label: Claude (Anthropic API)
[Claude]
; @label: API Key @type: secret @scope: backend @help: sk-ant-... from console.anthropic.com
api_key =
; @label: Model @type: str @scope: backend
model_name = claude-haiku-4-5-20251001
; @label: Max Tokens @type: int @min: 50 @max: 8192 @scope: backend
max_tokens = 500

; @section-label: HuggingFace
[HuggingFace]
; @label: API Key @type: secret @scope: backend @help: hf_... from huggingface.co/settings/tokens
api_key =
; @label: Default Models @type: list @scope: backend @help: First model is used
default_models = meta-llama/Meta-Llama-3-8B-Instruct,mistralai/Mistral-7B-Instruct-v0.3

; @section-label: TTS Engine Chain
[TTSChain]
; @label: Provider Order @type: str @scope: backend @help: Kokoro service first (multi-user), then SAPI5/in-process Kokoro/online TTS/floor
tts_order = kokoro_service,sapi5,kokoro,elevenlabs,openai,pyttsx3

; @section-label: Kokoro Microservice (recommended for multi-user)
[KokoroService]
; @label: Host @type: str @scope: backend @help: localhost = use the dedicated kokoro_service. Empty = disable this provider. Remote IP works too.
host = localhost
; @label: Port @type: int @min: 1 @max: 65535 @scope: backend
port = 9998
; @label: Request Timeout (s) @type: int @min: 5 @max: 300 @scope: backend
timeout = 30
; @label: Deferred (click-to-listen) @type: bool @scope: backend @help: If true, service returns audio_id instead of WAV; browser fetches on user click. Use when autoplay is blocked.
deferred = false

; @section-label: Kokoro (local TTS)
[Kokoro]
; @label: Model Path @type: path @scope: backend @help: FULL path to kokoro-v1.0.onnx (the file, not its folder). Empty = disabled.
model_path =
; @label: Voices Path @type: path @scope: backend @help: Path to voices-v1.0.bin. Empty = look for it next to the .onnx file.
voices_path =
; @label: Voice @type: str @scope: backend @help: e.g. af_sarah, af_nicole, am_michael, bf_emma
voice = af_sarah
; @label: Speed @type: float @min: 0.5 @max: 2.0 @scope: backend @help: 1.0 = natural. Also used by the kokoro_service client.
speed = 1.0
; @label: ONNX Provider @type: choice @choices: CUDAExecutionProvider|CPUExecutionProvider @scope: backend @help: GPU (fast) or CPU (works everywhere). Realm logs ACTIVE providers on boot — check there if GPU isn't engaging.
onnx_provider = CUDAExecutionProvider
; @label: cuDNN Conv Algo Search @type: choice @choices: DEFAULT|HEURISTIC|EXHAUSTIVE @scope: backend @help: DEFAULT is fine for most. Raise to HEURISTIC/EXHAUSTIVE if you hit cuDNN conv failures.
cudnn_conv_algo_search = DEFAULT

; @section-label: ElevenLabs (premium online TTS)
[ElevenLabs]
; @label: API Key @type: secret @scope: backend @help: Get one at elevenlabs.io
api_key =
; @label: Voice ID @type: str @scope: backend
voice_id = EXAVITQu4vr4xnSDxMaL
; @label: Model @type: str @scope: backend @help: turbo_v2_5 = fast; multilingual_v2 = quality
model_id = eleven_turbo_v2_5

; @section-label: OpenAI (cheap online TTS)
[OpenAITTS]
; @label: API Key @type: secret @scope: backend @help: sk-... from platform.openai.com
api_key =
; @label: Model @type: choice @choices: tts-1|tts-1-hd @scope: backend
model = tts-1
; @label: Voice @type: choice @choices: alloy|echo|fable|onyx|nova|shimmer @scope: backend
voice = alloy

; @section-label: Star Trek Voice Loop
[VoiceLoop]
; @label: Wake Word @type: str @scope: frontend
wake_word = computer
; @label: Doubled Action Words @type: str @scope: frontend @help: Must be said twice to trigger
doubled_actions = stop,repeat,cancel,again
; @label: Barge-In @type: bool @scope: frontend @help: Listen for STOP STOP during TTS (uncheck if mic feedback)
barge_in = true
; @label: Waveform @type: bool @scope: frontend @help: Show audio waveform during capture
waveform = true
; @label: Recognition Lang @type: str @scope: frontend
recognition_lang = en-US

; @section-label: Weather
[Weather]
; @label: API Key @type: secret @scope: backend @help: openweathermap.org/api
api_key = 4putyourkeyherea
; @label: OneCall URL @type: url @scope: backend
onecall_url = https://api.openweathermap.org/data/3.0/onecall
; @label: Units @type: choice @choices: imperial|metric|standard @scope: backend
units = imperial

; @section-label: Music
; Searches DuckDuckGo's HTML endpoint for a YouTube video matching the
; user's spoken query, then the browser embeds the video directly from
; YouTube. No YouTube API key required (we never call YouTube's API).
[Music]
; @label: Enabled @type: bool @scope: backend
enabled = true
; @label: Search Suffix @type: string @scope: backend
; @help: Appended to user's query to bias toward music videos
search_suffix = official music video
; @label: Search Timeout (s) @type: float @min: 1.0 @scope: backend
search_timeout_s = 10

; @section-label: Service Finder
; "computer service finder haircut newline" → finds nearby businesses.
; Uses BizData (https://bizdata-web.vercel.app), a free REST wrapper
; around OpenStreetMap data — no API key, no quota. We reverse-geocode
; the user's browser location via Nominatim first to get the city name.
; bizdata_url is configurable so a sysop can swap to a self-hosted
; Overpass endpoint or another OSM-backed service.
[Service]
; @label: Enabled @type: bool @scope: backend
enabled = true
; @label: BizData URL @type: url @scope: backend
bizdata_url = https://bizdata-web.vercel.app/api/businesses
; @label: Nominatim URL @type: url @scope: backend
; @help: Reverse-geocodes lat/lon to city name. Free, no API key.
nominatim_url = https://nominatim.openstreetmap.org/reverse
; @label: Search radius (km) @type: float @min: 0.5 @scope: backend
radius_km = 5
; @label: Max results @type: int @min: 1 @max: 10 @scope: backend
max_results = 3
; @label: Timeout (s) @type: float @min: 1.0 @scope: backend
timeout_s = 12

[Metrics]
window_size = 20
broadcast_interval_s = 2.0

; @section-label: Websocket
[Websocket]
; @label: Heartbeat (ms) @type: int @min: 1000 @scope: frontend
heartbeat_interval_ms = 25000
; @label: Reconnect Initial (ms) @type: int @min: 100 @scope: frontend
reconnect_interval_ms = 1000
; @label: Reconnect Max (ms) @type: int @min: 1000 @scope: frontend
max_reconnect_interval_ms = 30000
; @label: Cookie Max Age (s) @type: int @min: 3600 @scope: frontend
cookie_max_age = 31536000
